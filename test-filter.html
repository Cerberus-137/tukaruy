<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Test Filter Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-8">
    <h1 class="text-2xl font-bold mb-4">Filter Debug Test</h1>
    
    <div class="space-y-4">
        <div>
            <label class="block mb-2">Test Dropdown:</label>
            <div id="test-dropdown-trigger" class="w-64 bg-slate-800 border border-slate-600 rounded px-4 py-2 cursor-pointer">
                <span id="test-display">Select option</span>
            </div>
            <div id="test-dropdown-menu" class="hidden w-64 mt-1 bg-slate-800 border border-slate-600 rounded">
                <div class="p-2">Option 1</div>
                <div class="p-2">Option 2</div>
                <div class="p-2">Option 3</div>
            </div>
        </div>
        
        <div>
            <h3 class="font-bold mb-2">Event Logs:</h3>
            <pre id="logs" class="bg-slate-900 p-4 rounded text-xs overflow-auto max-h-96"></pre>
        </div>
    </div>
    
    <script>
        const logs = [];
        function log(msg) {
            logs.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
            document.getElementById('logs').textContent = logs.join('\n');
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM Ready');
            
            const trigger = document.getElementById('test-dropdown-trigger');
            const menu = document.getElementById('test-dropdown-menu');
            
            if (trigger && menu) {
                log('Elements found');
                
                trigger.addEventListener('click', function(e) {
                    log('Trigger clicked');
                    menu.classList.toggle('hidden');
                });
                
                menu.querySelectorAll('div').forEach((item, index) => {
                    item.addEventListener('click', function() {
                        log(`Option ${index + 1} clicked`);
                        document.getElementById('test-display').textContent = this.textContent;
                        menu.classList.add('hidden');
                    });
                });
            } else {
                log('ERROR: Elements not found!');
            }
        });
        
        // Load main app.js to test for conflicts
        log('Loading app.js...');
        const script = document.createElement('script');
        script.src = 'assets/js/app.js';
        script.onload = () => log('app.js loaded successfully');
        script.onerror = () => log('ERROR: Failed to load app.js');
        document.body.appendChild(script);
    </script>
</body>
</html>
